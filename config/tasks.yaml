youtube_research_task:
  description: >
    Search the official Hedera YouTube channel for recent videos about '{topic}'.
    For the top 3 most relevant videos, fetch their transcripts.
    Summarize the key points from each video.
    Return the video metadata and transcript summaries.
  expected_output: >
    A structured list of recent Hedera YouTube videos with titles, URLs,
    publish dates, and a 2-3 sentence summary of each video's key points
    extracted from the transcript.
  agent: youtube_researcher

twitter_research_task:
  description: >
    Search X/Twitter for recent tweets from @Hedera and about #Hedera #HBAR.
    Identify the most important announcements, trending discussions, and
    community highlights from the past week.
    Focus on official announcements, partnerships, product updates, and events.
  expected_output: >
    A summary of the top 5-10 most important tweets/topics from Hedera's
    Twitter presence, including key quotes, engagement metrics, and
    identified trends.
  agent: twitter_researcher

web_research_task:
  description: >
    Scrape the official Hedera blog at hedera.com/blog for the most recent
    articles. Extract titles, summaries, and publication dates.
    Identify the main themes and any breaking news or major announcements.
  expected_output: >
    A list of recent Hedera blog articles with titles, URLs, brief summaries,
    and an analysis of the dominant themes and most newsworthy items.
  agent: web_researcher

content_strategy_task:
  description: >
    Analyze all research gathered from YouTube, Twitter, and web sources.
    Identify the single most compelling topic for content creation right now.
    Create a detailed content plan including topic, angle, 3-5 key points,
    target audience, and source references.
    The content should be factual, timely, and engaging for the Hedera community.
  expected_output: >
    A JSON content plan with fields: topic, angle, key_points (list),
    target_audience, sources (list of URLs), and content_types
    (["twitter", "medium", "discord"]).
  agent: content_strategist

twitter_writing_task:
  description: >
    Using the content plan, write a tweet thread (2-5 tweets) for X/Twitter.
    Each tweet must be under 280 characters.
    Include relevant hashtags (#Hedera, #HBAR, #Web3).
    First tweet should hook the reader. Last tweet should have a call to action.
    Do NOT invent facts not in the content plan.
  expected_output: >
    A JSON object with "tweets" (list of strings) and "hashtags" (list of strings).
  agent: content_writer

medium_writing_task:
  description: >
    Using the content plan, write a complete Medium article in Markdown.
    Title: 50-70 characters, compelling.
    Structure: TL;DR bullets, 3-4 H2 sections, conclusion with CTA.
    Length: 800-1500 words.
    Do NOT invent facts, metrics, or links not in the content plan.
  expected_output: >
    A JSON object with "title", "subtitle", "body" (Markdown string),
    and "tags" (list of up to 5 strings).
  agent: content_writer

discord_writing_task:
  description: >
    Using the content plan, write a Discord announcement message.
    Title: clear and attention-grabbing.
    Description: 2-4 paragraphs using Discord markdown, under 4000 chars.
    End with an engagement prompt.
    Do NOT invent facts not in the content plan.
  expected_output: >
    A JSON object with "title", "description", and optional "url".
  agent: content_writer

publish_twitter_task:
  description: >
    Take the finalized Twitter content and post it as a tweet thread
    using the Post Tweet tool.
    Report the posted tweet IDs and URLs.
  expected_output: >
    A JSON object with "platform": "twitter", "success": true/false,
    "url": "tweet URL", and optional "error" message.
  agent: content_publisher

publish_medium_task:
  description: >
    Take the finalized Medium article and publish it as a draft
    using the Publish to Medium tool.
    Report the article URL and publish status.
  expected_output: >
    A JSON object with "platform": "medium", "success": true/false,
    "url": "article URL", and optional "error" message.
  agent: content_publisher

publish_discord_task:
  description: >
    Take the finalized Discord message and post it to the configured
    Discord channel using the Post to Discord tool.
    Report the post status.
  expected_output: >
    A JSON object with "platform": "discord", "success": true/false,
    and optional "error" message.
  agent: content_publisher
